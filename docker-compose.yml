services:
  postgres:
    image: postgres:16-alpine
    container_name: safepassage-postgres
    environment:
      POSTGRES_DB: safepassage
      POSTGRES_USER: safepassage
      POSTGRES_PASSWORD: safepassage
    volumes:
      - safepassage_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safepassage -d safepassage"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: safepassage-backend
    env_file:
      - ./backend/.env
    environment:
      APP_CONFIG: production
      SQLALCHEMY_DATABASE_URI: postgresql://safepassage:safepassage@postgres:5432/safepassage
      ENABLE_HEARTBEAT_SCHEDULER: "0"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    restart: unless-stopped

volumes:
  safepassage_postgres_data: