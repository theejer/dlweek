services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: safepassage-backend
    env_file:
      - ./backend/.env
    environment:
      APP_CONFIG: production
      SQLALCHEMY_DATABASE_URI: sqlite:////app/safepassage.db
      ENABLE_HEARTBEAT_SCHEDULER: "0"
    ports:
      - "5000:5000"
    restart: unless-stopped